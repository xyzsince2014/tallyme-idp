db.driver_class_name=org.postgresql.Driver
db.url=jdbc:postgresql://postgres:5432/tallyme
db.username=dev_user
db.password=dev_password
db.connect_timeout=5
db.socket_timeout=30

cp.max_total=96
cp.max_idle=16
cp.min_idle=0
cp.max_wait_mills=60000

hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
hibernate.hbm2ddl.auto=validate
hibernate.show_sql=true
hibernate.format_sql=true
hibernate.default_schema=public

spring.jpa.database=POSTGRESQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.packages.entities=tallyme.idp.domain.entities.postgres

spring.sql.init.platform=postgresql
spring.sql.init.encoding=UTF-8
spring.sql.init.separator=/;

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type.EnumType=TRACE
